<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Tic Tac Toe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00c6ff,#8e2de2);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
button:hover{transform:scale(1.08)}

.hidden{display:none}

/* CANVAS */
canvas{
  border-radius:15px;
  background:rgba(255,255,255,0.03);
}

/* RESULT */
#resultOverlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.3s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* COIN */
.coin{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(45deg,#00f0ff,#ff00ff);
  margin:20px auto;
  animation:flip 0.8s infinite linear;
}
@keyframes flip{
  0%{transform:rotateY(0)}
  100%{transform:rotateY(360deg)}
}
</style>
</head>

<body>

<div id="startScreen" class="glass">
  <h1>Tic Tac Toe</h1>
  <button onclick="startGame('AI')">1 vs AI (Brutal)</button>
  <button onclick="startGame('LOCAL')">2 Player</button>
</div>

<div id="tossScreen" class="glass hidden">
  <h2>Flipping Coin...</h2>
  <div class="coin"></div>
  <p id="tossText"></p>
</div>

<div id="gameScreen" class="hidden">
  <canvas id="canvas"></canvas>
</div>

<div id="resultOverlay" class="hidden">
  <h1 id="resultText"></h1>
  <button onclick="resetGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let state;

/* ---------- STATE ENGINE ---------- */
function createState(){
  return {
    board:Array(9).fill(""),
    currentPlayer:null,
    mode:null,
    active:false,
    lock:false,
    winner:null,
    combo:null,
    aiTimer:null
  };
}

/* ---------- INIT ---------- */
function initCanvas(){
  const size=300, dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr;
  canvas.height=size*dpr;
  canvas.style.width=size+"px";
  canvas.style.height=size+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* ---------- START ---------- */
function startGame(mode){
  state=createState();
  state.mode=mode;

  show("tossScreen");
  hide("startScreen");

  setTimeout(()=>{
    state.currentPlayer=Math.random()<0.5?"X":"O";
    document.getElementById("tossText").innerText=state.currentPlayer+" starts";
  },800);

  setTimeout(()=>{
    hide("tossScreen");
    show("gameScreen");

    state.active=true;
    draw();

    if(state.mode==="AI" && state.currentPlayer==="O"){
      triggerAI();
    }
  },1800);
}

/* ---------- DRAW ---------- */
function draw(){
  ctx.clearRect(0,0,300,300);

  ctx.strokeStyle="#0ff";
  ctx.lineWidth=4;

  for(let i=1;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(i*100,0); ctx.lineTo(i*100,300); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,i*100); ctx.lineTo(300,i*100); ctx.stroke();
  }

  state.board.forEach((c,i)=>{
    if(c) drawSymbol(i,c);
  });

  if(state.combo) drawWin();
}

/* ---------- SYMBOL ---------- */
function drawSymbol(i,p){
  const x=(i%3)*100+50;
  const y=Math.floor(i/3)*100+50;

  ctx.strokeStyle=p==="X"?"#0ff":"#f0f";
  ctx.lineWidth=5;

  if(p==="X"){
    ctx.beginPath();
    ctx.moveTo(x-25,y-25); ctx.lineTo(x+25,y+25);
    ctx.moveTo(x+25,y-25); ctx.lineTo(x-25,y+25);
    ctx.stroke();
  }else{
    ctx.beginPath();
    ctx.arc(x,y,25,0,Math.PI*2);
    ctx.stroke();
  }
}

/* ---------- WIN LINE ---------- */
function drawWin(){
  const [a,,c]=state.combo;
  const pos=i=>[(i%3)*100+50,Math.floor(i/3)*100+50];
  const [x1,y1]=pos(a);
  const [x2,y2]=pos(c);

  ctx.strokeStyle="yellow";
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

/* ---------- CLICK ---------- */
canvas.addEventListener("click",e=>{
  if(!state.active || state.lock) return;

  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/100);
  const y=Math.floor((e.clientY-rect.top)/100);
  const i=y*3+x;

  if(state.board[i]) return;

  play(i,state.currentPlayer);
});

/* ---------- PLAY ---------- */
function play(i,p){
  state.board[i]=p;

  if(checkWin(p)){
    state.active=false;
    draw();
    return endGame(p+" Wins");
  }

  if(!state.board.includes("")){
    state.active=false;
    return endGame("Draw");
  }

  state.currentPlayer = p==="X"?"O":"X";
  draw();

  if(state.mode==="AI" && state.currentPlayer==="O"){
    triggerAI();
  }
}

/* ---------- AI ---------- */
function triggerAI(){
  state.lock=true;

  state.aiTimer=setTimeout(()=>{
    if(!state.active) return;

    let best=-Infinity, move;

    for(let i=0;i<9;i++){
      if(!state.board[i]){
        state.board[i]="O";
        let score=minimax(state.board,0,false);
        state.board[i]="";
        if(score>best){best=score;move=i;}
      }
    }

    state.lock=false;
    play(move,"O");

  },250);
}

function minimax(b,d,isMax){
  if(winStatic(b,"O")) return 10-d;
  if(winStatic(b,"X")) return d-10;
  if(!b.includes("")) return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i]="O";
        best=Math.max(best,minimax(b,d+1,false));
        b[i]="";
      }
    }
    return best;
  }else{
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i]="X";
        best=Math.min(best,minimax(b,d+1,true));
        b[i]="";
      }
    }
    return best;
  }
}

/* ---------- WIN ---------- */
function checkWin(p){
  const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let c of w){
    if(c.every(i=>state.board[i]===p)){
      state.combo=c;
      return true;
    }
  }
  return false;
}

function winStatic(b,p){
  const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c=>c.every(i=>b[i]===p));
}

/* ---------- END ---------- */
function endGame(text){
  document.getElementById("resultText").innerText=text;
  show("resultOverlay");
}

/* ---------- RESET ---------- */
function resetGame(){
  if(state.aiTimer) clearTimeout(state.aiTimer);
  state=null;

  hide("resultOverlay");
  hide("gameScreen");
  hide("tossScreen");
  show("startScreen");
}

/* ---------- UI ---------- */
function show(id){document.getElementById(id).classList.remove("hidden")}
function hide(id){document.getElementById(id).classList.add("hidden")}

initCanvas();
</script>

</body>
</html>

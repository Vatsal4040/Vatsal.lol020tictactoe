<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* BACKGROUND PIXELS */
#bgCanvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* SCREENS */
.screen{display:none;text-align:center;}
.screen.active{display:block;}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00ffe7;
  font-weight:bold;
  cursor:pointer;
}

/* GAME */
.top{
  display:flex;
  justify-content:space-between;
  width:90vw;
  max-width:400px;
  margin:auto;
}
.top img{
  width:50px;height:50px;border-radius:50%;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:90vw;
  max-width:400px;
  margin:20px auto;
}
.cell{
  aspect-ratio:1;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:3rem;
  background:#111;
  border-radius:10px;
  cursor:pointer;
}
.neonX{color:#00eaff;text-shadow:0 0 15px #00eaff;}
.neonO{color:#ff2d75;text-shadow:0 0 15px #ff2d75;}

/* RESULT */
#resultOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.resultBox{
  background:#111;
  padding:30px;
  border-radius:15px;
}

@media(max-width:500px){
  .cell{font-size:2rem;}
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- START -->
<div id="startScreen" class="screen active">
  <h1>Choose Your Symbol</h1>
  <button onclick="startGame('X')">Play as X</button>
  <button onclick="startGame('O')">Play as O</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="top">
    <div><img id="playerAvatar"><p>You</p></div>
    <div><img id="aiAvatar"><p>AI 🤖</p></div>
  </div>

  <div id="board" class="board"></div>
  <h2 id="status"></h2>

  <button onclick="restart()">Restart</button>
</div>

<!-- RESULT -->
<div id="resultOverlay">
  <div class="resultBox">
    <h1 id="resultText"></h1>
    <button onclick="playAgain()">Play Again</button>
  </div>
</div>

<script>
// AVATARS
const avatars=[
"https://i.pravatar.cc/150?img=1",
"https://i.pravatar.cc/150?img=2",
"https://i.pravatar.cc/150?img=3",
"https://i.pravatar.cc/150?img=15",
"https://i.pravatar.cc/150?img=20",
"https://i.pravatar.cc/150?img=30"
];

let player, ai, turn, boardArr;

// START GAME
function startGame(symbol){
  player=symbol;
  ai=symbol==="X"?"O":"X";
  turn="X";

  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  // avatars
  let pAvatar=avatars[Math.floor(Math.random()*avatars.length)];
  let aAvatar;
  do{
    aAvatar=avatars[Math.floor(Math.random()*avatars.length)];
  }while(aAvatar===pAvatar);

  document.getElementById("playerAvatar").src=pAvatar;
  document.getElementById("aiAvatar").src=aAvatar;

  initBoard();

  if(ai==="X") aiMove();
}

// BOARD INIT
function initBoard(){
  boardArr=["","","","","","","","",""];
  const board=document.getElementById("board");
  board.innerHTML="";

  boardArr.forEach((_,i)=>{
    let cell=document.createElement("div");
    cell.className="cell";
    cell.onclick=()=>move(i);
    board.appendChild(cell);
  });

  updateStatus();
}

// MOVE
function move(i){
  if(boardArr[i]!=="" || turn!==player) return;

  boardArr[i]=player;
  turn=ai;
  render();

  if(checkEnd()) return;

  setTimeout(aiMove,300);
}

// AI MOVE (MINIMAX)
function aiMove(){
  let bestScore=-Infinity;
  let moveIndex;

  for(let i=0;i<9;i++){
    if(boardArr[i]===""){
      boardArr[i]=ai;
      let score=minimax(boardArr,0,false);
      boardArr[i]="";
      if(score>bestScore){
        bestScore=score;
        moveIndex=i;
      }
    }
  }

  boardArr[moveIndex]=ai;
  turn=player;
  render();
  checkEnd();
}

// MINIMAX
function minimax(board, depth, isMax){
  let result=checkWinner(board);
  if(result!==null){
    if(result===ai) return 10-depth;
    if(result===player) return depth-10;
    return 0;
  }

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]=ai;
        best=Math.max(best,minimax(board,depth+1,false));
        board[i]="";
      }
    }
    return best;
  }else{
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]=player;
        best=Math.min(best,minimax(board,depth+1,true));
        board[i]="";
      }
    }
    return best;
  }
}

// CHECK
function checkWinner(b){
  const wins=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for(let w of wins){
    if(b[w[0]] && b[w[0]]===b[w[1]] && b[w[1]]===b[w[2]]){
      return b[w[0]];
    }
  }

  if(b.every(x=>x!=="")) return "draw";
  return null;
}

function checkEnd(){
  let res=checkWinner(boardArr);
  if(res===null) return false;

  let text = res==="draw" ? "Draw 🤝" :
             res===player ? "You Win 🎉" : "AI Wins 🤖";

  document.getElementById("resultText").innerText=text;
  document.getElementById("resultOverlay").style.display="flex";
  return true;
}

// RENDER
function render(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.textContent=boardArr[i];
    c.className="cell "+(boardArr[i]==="X"?"neonX":"neonO");
  });
  updateStatus();
}

function updateStatus(){
  document.getElementById("status").innerText=
    turn===player ? "Your Turn" : "AI Thinking...";
}

// RESET
function restart(){
  initBoard();
  if(ai==="X") aiMove();
}

function playAgain(){
  document.getElementById("resultOverlay").style.display="none";
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("startScreen").classList.add("active");
}

// BACKGROUND PIXELS
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*3,
    speed:Math.random()*0.5,
    color:`hsl(${Math.random()*360},100%,50%)`
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y+=p.speed;
    if(p.y>canvas.height) p.y=0;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>

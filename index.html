<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Tic Tac Toe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }

body {
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* GLASS */
.glass {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
}

/* BUTTON */
button {
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00c6ff,#8e2de2);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover { transform:scale(1.1); }

.hidden { display:none; }

canvas {
  border-radius:15px;
  background:rgba(255,255,255,0.03);
}

/* RESULT */
#resultOverlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.4s;
}
@keyframes fadeIn {
  from{opacity:0} to{opacity:1}
}

/* TOSS ANIMATION */
.coin {
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(45deg,#00f0ff,#ff00ff);
  margin:20px auto;
  animation:flip 0.8s infinite;
}
@keyframes flip {
  0%{transform:rotateY(0)}
  100%{transform:rotateY(360deg)}
}
</style>
</head>

<body>

<div id="startScreen" class="glass">
  <h1>Tic Tac Toe</h1>
  <button onclick="startGame('AI')">1 vs AI</button>
  <button onclick="startGame('LOCAL')">2 Player</button>
</div>

<div id="tossScreen" class="glass hidden">
  <h2>Flipping Coin...</h2>
  <div class="coin"></div>
  <p id="tossText"></p>
</div>

<div id="gameScreen" class="hidden">
  <canvas id="canvas"></canvas>
</div>

<div id="resultOverlay" class="hidden">
  <h1 id="resultText"></h1>
  <button onclick="resetGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let board, currentPlayer, gameMode, gameActive, winningCombo = null;

/* CANVAS DPI FIX */
function resizeCanvas(){
  const size = 300;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();

/* START */
function startGame(mode){
  gameMode = mode;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("tossScreen").classList.remove("hidden");

  setTimeout(()=>{
    currentPlayer = Math.random()<0.5 ? "X":"O";
    document.getElementById("tossText").innerText = currentPlayer+" starts";
  },1000);

  setTimeout(()=>{
    document.getElementById("tossScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");
    initGame();
  },2000);
}

/* INIT */
function initGame(){
  board = Array(9).fill("");
  gameActive = true;
  winningCombo = null;
  draw();

  if(gameMode==="AI" && currentPlayer==="O"){
    setTimeout(aiMove,300);
  }
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,300,300);

  ctx.strokeStyle="#0ff";
  ctx.lineWidth=4;

  for(let i=1;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(i*100,0);
    ctx.lineTo(i*100,300);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i*100);
    ctx.lineTo(300,i*100);
    ctx.stroke();
  }

  board.forEach((cell,i)=>{
    if(cell) drawSymbol(i,cell);
  });

  if(winningCombo){
    drawWinLine();
  }
}

/* SYMBOL */
function drawSymbol(i,p){
  const x=(i%3)*100+50;
  const y=Math.floor(i/3)*100+50;

  ctx.strokeStyle = p==="X" ? "#0ff":"#f0f";
  ctx.lineWidth=5;

  if(p==="X"){
    ctx.beginPath();
    ctx.moveTo(x-25,y-25);
    ctx.lineTo(x+25,y+25);
    ctx.moveTo(x+25,y-25);
    ctx.lineTo(x-25,y+25);
    ctx.stroke();
  }else{
    ctx.beginPath();
    ctx.arc(x,y,25,0,Math.PI*2);
    ctx.stroke();
  }
}

/* WIN LINE */
function drawWinLine(){
  const [a,b,c]=winningCombo;
  const getXY=i=>[(i%3)*100+50,Math.floor(i/3)*100+50];

  const [x1,y1]=getXY(a);
  const [x2,y2]=getXY(c);

  ctx.strokeStyle="yellow";
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

/* CLICK */
canvas.addEventListener("click",e=>{
  if(!gameActive) return;

  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/100);
  const y=Math.floor((e.clientY-rect.top)/100);
  const i=y*3+x;

  if(board[i]) return;

  makeMove(i,currentPlayer);

  if(gameMode==="AI" && gameActive && currentPlayer==="O"){
    setTimeout(aiMove,300);
  }
});

/* MOVE */
function makeMove(i,p){
  board[i]=p;

  if(checkWin(p)){
    gameActive=false;
    draw();
    setTimeout(()=>endGame(p+" Wins"),400);
    return;
  }

  if(!board.includes("")){
    gameActive=false;
    endGame("Draw");
    return;
  }

  currentPlayer = p==="X" ? "O":"X";
  draw();
}

/* WIN */
function checkWin(p){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let w of wins){
    if(w.every(i=>board[i]===p)){
      winningCombo=w;
      return true;
    }
  }
  return false;
}

/* AI */
function aiMove(){
  let best=-Infinity, move;

  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i]="O";
      let score=minimax(board,0,false);
      board[i]="";
      if(score>best){best=score; move=i;}
    }
  }
  makeMove(move,"O");
}

function minimax(b,d,isMax){
  if(checkStaticWin(b,"O")) return 10-d;
  if(checkStaticWin(b,"X")) return d-10;
  if(!b.includes("")) return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i]="O";
        best=Math.max(best,minimax(b,d+1,false));
        b[i]="";
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i]="X";
        best=Math.min(best,minimax(b,d+1,true));
        b[i]="";
      }
    }
    return best;
  }
}

function checkStaticWin(b,p){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return wins.some(w=>w.every(i=>b[i]===p));
}

/* END */
function endGame(text){
  document.getElementById("resultText").innerText=text;
  document.getElementById("resultOverlay").classList.remove("hidden");
}

/* RESET */
function resetGame(){
  document.getElementById("resultOverlay").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>

</body>
</html>
